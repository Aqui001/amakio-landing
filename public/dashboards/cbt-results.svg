<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0B1F4D"/>
      <stop offset="100%" stop-color="#162850"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#e8b82a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="520" rx="12" fill="#0d0d1a"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="40" width="800" height="12" fill="url(#headerGrad)"/>
  <circle cx="20" cy="26" r="5" fill="#D4A017"/>
  <text x="34" y="30" fill="#f1f1f7" font-size="13" font-weight="600">Amakio</text>
  <text x="80" y="30" fill="#6b6b8d" font-size="11">| School Operating System</text>
  <rect x="706" y="16" width="74" height="22" rx="11" fill="rgba(212,160,23,0.15)"/>
  <text x="716" y="31" fill="#D4A017" font-size="10" font-weight="600">CBT SYSTEM</text>

  <!-- Title -->
  <text x="30" y="78" fill="#f1f1f7" font-size="18" font-weight="700">CBT Results Dashboard</text>
  <text x="30" y="96" fill="#6b6b8d" font-size="11">Term 2 — 2024/2025 &#160;|&#160; Updated 13 Jun 2026</text>

  <!-- Summary Cards -->
  <g filter="url(#shadow)">
    <rect x="30" y="110" width="145" height="70" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="52" y="134" fill="#6b6b8d" font-size="9" font-weight="500">TOTAL EXAMS</text>
    <text x="52" y="158" fill="#f1f1f7" font-size="22" font-weight="800">12</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="190" y="110" width="145" height="70" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="212" y="134" fill="#6b6b8d" font-size="9" font-weight="500">STUDENTS ASSESSED</text>
    <text x="212" y="158" fill="#f1f1f7" font-size="22" font-weight="800">486</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="350" y="110" width="145" height="70" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="372" y="134" fill="#6b6b8d" font-size="9" font-weight="500">AVERAGE SCORE</text>
    <text x="372" y="158" fill="#10B981" font-size="22" font-weight="800">67.4%</text>
    <text x="460" y="158" fill="#10B981" font-size="9">+4.1%</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="510" y="110" width="145" height="70" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="532" y="134" fill="#6b6b8d" font-size="9" font-weight="500">PASS RATE</text>
    <text x="532" y="158" fill="#10B981" font-size="22" font-weight="800">78.2%</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="670" y="110" width="100" height="70" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="685" y="134" fill="#6b6b8d" font-size="9" font-weight="500">TOP SCORE</text>
    <text x="685" y="158" fill="#D4A017" font-size="18" font-weight="800">98%</text>
  </g>

  <!-- Subject Performance Chart -->
  <g filter="url(#shadow)">
    <rect x="30" y="195" width="420" height="190" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="48" y="220" fill="#f1f1f7" font-size="12" font-weight="600">Performance by Subject</text>
    <text x="48" y="235" fill="#6b6b8d" font-size="9">Average scores across all exams</text>

    <text x="60" y="258" fill="#9494b8" font-size="9">Mathematics</text>
    <text x="420" y="258" fill="#f1f1f7" font-size="9" font-weight="600" text-anchor="end">72%</text>
    <rect x="140" y="262" width="240" height="8" rx="4" fill="#1e1e3a"/>
    <rect x="140" y="262" width="173" height="8" rx="4" fill="url(#greenGrad)"/>

    <text x="60" y="282" fill="#9494b8" font-size="9">English Language</text>
    <text x="420" y="282" fill="#f1f1f7" font-size="9" font-weight="600" text-anchor="end">68%</text>
    <rect x="140" y="286" width="240" height="8" rx="4" fill="#1e1e3a"/>
    <rect x="140" y="286" width="163" height="8" rx="4" fill="url(#greenGrad)"/>

    <text x="60" y="306" fill="#9494b8" font-size="9">Basic Science</text>
    <text x="420" y="306" fill="#f1f1f7" font-size="9" font-weight="600" text-anchor="end">71%</text>
    <rect x="140" y="310" width="240" height="8" rx="4" fill="#1e1e3a"/>
    <rect x="140" y="310" width="170" height="8" rx="4" fill="url(#greenGrad)"/>

    <text x="60" y="330" fill="#9494b8" font-size="9">Social Studies</text>
    <text x="420" y="330" fill="#f1f1f7" font-size="9" font-weight="600" text-anchor="end">65%</text>
    <rect x="140" y="334" width="240" height="8" rx="4" fill="#1e1e3a"/>
    <rect x="140" y="334" width="156" height="8" rx="4" fill="url(#goldGrad)"/>

    <text x="60" y="354" fill="#9494b8" font-size="9">ICT &amp; Computer</text>
    <text x="420" y="354" fill="#f1f1f7" font-size="9" font-weight="600" text-anchor="end">78%</text>
    <rect x="140" y="358" width="240" height="8" rx="4" fill="#1e1e3a"/>
    <rect x="140" y="358" width="187" height="8" rx="4" fill="url(#greenGrad)"/>

    <!-- Legend -->
    <rect x="48" y="374" width="8" height="8" rx="2" fill="#10B981"/>
    <text x="62" y="381" fill="#6b6b8d" font-size="8">Passing (&#8805;50%)</text>
    <rect x="150" y="374" width="8" height="8" rx="2" fill="#D4A017"/>
    <text x="164" y="381" fill="#6b6b8d" font-size="8">Below average</text>
  </g>

  <!-- Grade Distribution -->
  <g filter="url(#shadow)">
    <rect x="465" y="195" width="305" height="190" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="483" y="220" fill="#f1f1f7" font-size="12" font-weight="600">Grade Distribution</text>
    <text x="483" y="235" fill="#6b6b8d" font-size="9">Number of students per grade band</text>

    <!-- Horizontal bars -->
    <text x="483" y="258" fill="#10B981" font-size="9" font-weight="600">A (75-100%)</text>
    <text x="740" y="258" fill="#f1f1f7" font-size="9" text-anchor="end">118</text>
    <rect x="483" y="262" width="242" height="8" rx="4" fill="url(#greenGrad)"/>

    <text x="483" y="282" fill="#10B981" font-size="9" font-weight="600">B (65-74%)</text>
    <text x="740" y="282" fill="#f1f1f7" font-size="9" text-anchor="end">142</text>
    <rect x="483" y="286" width="228" height="8" rx="4" fill="url(#greenGrad)"/>

    <text x="483" y="306" fill="#D4A017" font-size="9" font-weight="600">C (50-64%)</text>
    <text x="740" y="306" fill="#f1f1f7" font-size="9" text-anchor="end">120</text>
    <rect x="483" y="310" width="192" height="8" rx="4" fill="url(#goldGrad)"/>

    <text x="483" y="330" fill="#F59E0B" font-size="9" font-weight="600">D (40-49%)</text>
    <text x="740" y="330" fill="#f1f1f7" font-size="9" text-anchor="end">62</text>
    <rect x="483" y="334" width="99" height="8" rx="4" fill="#F59E0B"/>

    <text x="483" y="354" fill="#EF4444" font-size="9" font-weight="600">F (0-39%)</text>
    <text x="740" y="354" fill="#f1f1f7" font-size="9" text-anchor="end">44</text>
    <rect x="483" y="358" width="70" height="8" rx="4" fill="url(#redGrad)"/>

    <line x1="483" y1="370" x2="750" y2="370" stroke="#1e1e3a" stroke-width="0.5"/>
    <text x="483" y="382" fill="#f1f1f7" font-size="10" font-weight="700">Total Students</text>
    <text x="740" y="382" fill="#D4A017" font-size="10" font-weight="700" text-anchor="end">486</text>
  </g>

  <!-- Top Performers -->
  <g filter="url(#shadow)">
    <rect x="30" y="398" width="740" height="108" rx="8" fill="#07070e" stroke="#1e1e3a" stroke-width="1"/>
    <text x="48" y="422" fill="#f1f1f7" font-size="12" font-weight="600">Top Performing Students</text>

    <!-- Table header -->
    <rect x="48" y="430" width="702" height="22" rx="4" fill="#14142a"/>
    <text x="65" y="444" fill="#6b6b8d" font-size="9" font-weight="600">STUDENT</text>
    <text x="220" y="444" fill="#6b6b8d" font-size="9" font-weight="600">CLASS</text>
    <text x="340" y="444" fill="#6b6b8d" font-size="9" font-weight="600">EXAM</text>
    <text x="490" y="444" fill="#6b6b8d" font-size="9" font-weight="600">DATE</text>
    <text x="570" y="444" fill="#6b6b8d" font-size="9" font-weight="600">SCORE</text>
    <text x="680" y="444" fill="#6b6b8d" font-size="9" font-weight="600">GRADE</text>

    <!-- Row 1 -->
    <text x="65" y="467" fill="#f1f1f7" font-size="10">Okafor, Chioma</text>
    <text x="220" y="467" fill="#9494b8" font-size="10">Grade 5A</text>
    <text x="340" y="467" fill="#9494b8" font-size="10">Mathematics</text>
    <text x="490" y="467" fill="#9494b8" font-size="10">10 Jun 2026</text>
    <text x="570" y="467" fill="#10B981" font-size="10" font-weight="700">98%</text>
    <text x="685" y="467" fill="#10B981" font-size="10" font-weight="600">A</text>

    <!-- Row 2 -->
    <text x="65" y="483" fill="#f1f1f7" font-size="10">Ogunleye, David</text>
    <text x="220" y="483" fill="#9494b8" font-size="10">Grade 6B</text>
    <text x="340" y="483" fill="#9494b8" font-size="10">ICT &amp; Computer</text>
    <text x="490" y="483" fill="#9494b8" font-size="10">08 Jun 2026</text>
    <text x="570" y="483" fill="#10B981" font-size="10" font-weight="700">96%</text>
    <text x="685" y="483" fill="#10B981" font-size="10" font-weight="600">A</text>

    <!-- Row 3 -->
    <text x="65" y="499" fill="#f1f1f7" font-size="10">Adebisi, Fatima</text>
    <text x="220" y="499" fill="#9494b8" font-size="10">Grade 4B</text>
    <text x="340" y="499" fill="#9494b8" font-size="10">Basic Science</text>
    <text x="490" y="499" fill="#9494b8" font-size="10">05 Jun 2026</text>
    <text x="570" y="499" fill="#10B981" font-size="10" font-weight="700">94%</text>
    <text x="685" y="499" fill="#10B981" font-size="10" font-weight="600">A</text>
  </g>
</svg>