    <text x="220" y="483" fill="#9494b8" font-size="10">Grade 3A</text>
    <text x="340" y="483" fill="#9494b8" font-size="10">Installment (2/3)</text>
    <text x="490" y="483" fill="#9494b8" font-size="10">10 Jun 2026</text>
    <text x="570" y="483" fill="#f1f1f7" font-size="10" font-weight="600">&#8358;5,000</text>
    <rect x="676" y="474" width="52" height="16" rx="8" fill="rgba(245,158,11,0.15)"/>
    <text x="685" y="485" fill="#F59E0B" font-size="9" font-weight="600">Partial</text>

    <!-- Row 3 -->
    <text x="65" y="499" fill="#f1f1f7" font-size="10">Nwachukwu, Somto</text>
    <text x="220" y="499" fill="#9494b8" font-size="10">Grade 2B</text>
    <text x="340" y="499" fill="#9494b8" font-size="10">Full Tuition</text>
    <text x="490" y="499" fill="#9494b8" font-size="10">08 Jun 2026</text>
    <text x="570" y="499" fill="#f1f1f7" font-size="10" font-weight="600">&#8358;14,800</text>
    <rect x="676" y="490" width="52" height="16" rx="8" fill="rgba(16,185,129,0.15)"/>
    <text x="685" y="501" fill="#10B981" font-size="9" font-weight="600">Paid</text>
