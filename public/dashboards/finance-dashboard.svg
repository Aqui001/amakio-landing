    <text x="340" y="444" fill="#6b6b8d" font-size="9" font-weight="600">FEE TYPE</text>
    <text x="490" y="444" fill="#6b6b8d" font-size="9" font-weight="600">DATE</text>
    <text x="570" y="444" fill="#6b6b8d" font-size="9" font-weight="600">AMOUNT</text>
    <text x="680" y="444" fill="#6b6b8d" font-size="9" font-weight="600">STATUS</text>

    <!-- Row 1 -->
    <text x="65" y="467" fill="#f1f1f7" font-size="10">Okafor, Chioma</text>
    <text x="220" y="467" fill="#9494b8" font-size="10">Grade 5A</text>
    <text x="340" y="467" fill="#9494b8" font-size="10">Full Tuition</text>
    <text x="490" y="467" fill="#9494b8" font-size="10">12 Jun 2026</text>
    <text x="570" y="467" fill="#f1f1f7" font-size="10" font-weight="600">&#8358;14,800</text>
    <rect x="676" y="458" width="52" height="16" rx="8" fill="rgba(16,185,129,0.15)"/>
    <text x="685" y="469" fill="#10B981" font-size="9" font-weight="600">Paid</text>

    <!-- Row 2 -->
