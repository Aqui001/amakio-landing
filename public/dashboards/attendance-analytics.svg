    <text x="185" y="467" fill="#f1f1f7" font-size="10">568</text>
    <text x="305" y="467" fill="#10B981" font-size="10" font-weight="600">542</text>
    <text x="425" y="467" fill="#EF4444" font-size="10">18</text>
    <text x="545" y="467" fill="#F59E0B" font-size="10">8</text>
    <text x="665" y="467" fill="#f1f1f7" font-size="10" font-weight="600">95.4%</text>

    <!-- Row 2 -->
    <text x="65" y="483" fill="#f1f1f7" font-size="10">February</text>
    <text x="185" y="483" fill="#f1f1f7" font-size="10">572</text>
    <text x="305" y="483" fill="#10B981" font-size="10" font-weight="600">544</text>
    <text x="425" y="483" fill="#EF4444" font-size="10">14</text>
    <text x="545" y="483" fill="#F59E0B" font-size="10">14</text>
    <text x="665" y="483" fill="#f1f1f7" font-size="10" font-weight="600">95.1%</text>

    <!-- Row 3 -->
    <text x="65" y="499" fill="#f1f1f7" font-size="10">March</text>
    <text x="185" y="499" fill="#f1f1f7" font-size="10">580</text>
    <text x="305" y="499" fill="#10B981" font-size="10" font-weight="600">548</text>
    <text x="425" y="499" fill="#EF4444" font-size="10">21</text>
    <text x="545" y="499" fill="#F59E0B" font-size="10">11</text>
    <text x="665" y="499" fill="#f1f1f7" font-size="10" font-weight="600">94.5%</text>
